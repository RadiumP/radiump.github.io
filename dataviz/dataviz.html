<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" type="text/css" href="js/dropdowns-enhancement.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.4/css/bootstrap.min.css">
    <style>
      html, body { height: 100%; margin: 0; padding: 0; font-family: Arial, sans-serif; }
      .app-layout { display: flex; height: 100vh; }
      #sidebar { width: 320px; min-width: 280px; background: #f5f5f5; padding: 15px; overflow-y: auto; border-right: 1px solid #ddd; display: flex; flex-direction: column; gap: 10px; }
      #sidebar h3 { margin: 0 0 5px; font-size: 16px; }
      #map-canvas { flex: 1; height: 100%; }
      .controls-row { display: flex; flex-wrap: wrap; gap: 6px; }
      #rankbtn { display: none; }
      #rankbtn .btn { display: block; width: 100%; text-align: left; margin-bottom: 3px; font-size: 12px; }
      #weight { display: none; padding: 8px 0; }
      #weight input[type=range] { width: 100%; }
      #legend img { max-width: 100%; }
      .labels { color: black; background-color: #FF8075; font-family: Arial; font-size: 11px; font-weight: bold; text-align: center; width: 12px; }
      .leaflet-rank-icon { background: none; border: none; }
      .rank-label { font-size: 12px; font-weight: bold; color: #fff; background: #FF8075; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
      .rank-label.gold { background: #FFD700; color: #333; width: 32px; height: 32px; font-size: 14px; }
      .rank-label.silver { background: #C0C0C0; color: #333; width: 30px; height: 30px; font-size: 13px; }
      .rank-label.bronze { background: #CD7F32; color: #fff; width: 28px; height: 28px; }
      a.guide-link { display: inline-block; margin-top: 5px; font-size: 13px; }
    </style>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://code.jquery.com/jquery-1.9.1.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.4/js/bootstrap.min.js"></script>
    <script src="https://code.jquery.com/jquery-migrate-1.1.1.min.js"></script>
    <script src="js/functions.js?v=2"></script>
    <script src="js/dropdowns-enhancement.js"></script>
    <script src="https://d3js.org/d3.v3.min.js"></script>
    <script src="js/liquidFillGauge.js"></script>
  </head>
  <body>

<div class="app-layout">
  <div id="sidebar">
    <h3>Food in Phoenix 2015</h3>

    <div class="controls-row">
      <div id="catebtn" class="btn-group">
        <button data-toggle="dropdown" class="btn btn-success dropdown-toggle">Category <span class="caret"></span></button>
        <ul class="dropdown-menu">
          <li><input id="Seafood" name="ex1" value="1" type="radio"><label for="Seafood">Seafood</label></li>
          <li><input id="Mexican" name="ex1" value="2" type="radio"><label for="Mexican">Mexican</label></li>
          <li><input id="Chinese" name="ex1" value="3" type="radio"><label for="Chinese">Chinese</label></li>
          <li><input id="Japanese" name="ex1" value="4" type="radio"><label for="Japanese">Japanese</label></li>
          <li><input id="American" name="ex1" value="5" type="radio"><label for="American">American(Traditional)</label></li>
          <li><input id="Italian" name="ex1" value="6" type="radio"><label for="Italian">Italian</label></li>
        </ul>
      </div>

      <div id="ChineseMenu" style="display:none;" class="btn-group">
        <button data-toggle="dropdown" class="btn btn-success dropdown-toggle">Menu<span class="caret"></span></button>
        <ul class="dropdown-menu">
          <li><input id="C_Chicken" name="ex1" value="1" type="radio"><label for="C_Chicken">Chicken</label></li>
          <li><input id="C_Beef" name="ex1" value="2" type="radio"><label for="C_Beef">Beef</label></li>
          <li><input id="C_Tofu" name="ex1" value="3" type="radio"><label for="C_Tofu">Tofu</label></li>
          <li><input id="C_Dumpling" name="ex1" value="4" type="radio"><label for="C_Dumpling">Dumpling</label></li>
          <li><input id="C_Fish" name="ex1" value="5" type="radio"><label for="C_Fish">Fish</label></li>
          <li><input id="C_Noodle" name="ex1" value="6" type="radio"><label for="C_Noodle">Noodles</label></li>
          <li><input id="C_Duck" name="ex1" value="7" type="radio"><label for="C_Duck">Duck</label></li>
          <li><input id="C_Pork" name="ex1" value="8" type="radio"><label for="C_Pork">Pork</label></li>
        </ul>
      </div>
      <div id="SeafoodMenu" style="display:none;" class="btn-group">
        <button data-toggle="dropdown" class="btn btn-success dropdown-toggle">Menu <span class="caret"></span></button>
        <ul class="dropdown-menu">
          <li><input id="S_Crab" name="ex1" value="1" type="radio"><label for="S_Crab">Crab</label></li>
          <li><input id="S_Lobster" name="ex1" value="2" type="radio"><label for="S_Lobster">Lobster</label></li>
          <li><input id="S_Fish" name="ex1" value="3" type="radio"><label for="S_Fish">Fish</label></li>
          <li><input id="S_Oyster" name="ex1" value="4" type="radio"><label for="S_Oyster">Oyster</label></li>
          <li><input id="S_Tuna" name="ex1" value="5" type="radio"><label for="S_Tuna">Tuna</label></li>
          <li><input id="S_Clam" name="ex1" value="6" type="radio"><label for="S_Clam">Clam</label></li>
          <li><input id="S_Shrimp" name="ex1" value="7" type="radio"><label for="S_Shrimp">Shrimp</label></li>
          <li><input id="S_Salmon" name="ex1" value="8" type="radio"><label for="S_Salmon">Salmon</label></li>
        </ul>
      </div>
      <div id="MexicanMenu" style="display:none;" class="btn-group">
        <button data-toggle="dropdown" class="btn btn-success dropdown-toggle">Menu <span class="caret"></span></button>
        <ul class="dropdown-menu">
          <li><input id="M_Taco" name="ex1" value="1" type="radio"><label for="M_Taco">Taco</label></li>
          <li><input id="M_Burrito" name="ex1" value="2" type="radio"><label for="M_Burrito">Burrito</label></li>
          <li><input id="M_Quesadilla" name="ex1" value="3" type="radio"><label for="M_Quesadilla">Quesadilla</label></li>
          <li><input id="M_Enchilada" name="ex1" value="4" type="radio"><label for="M_Enchilada">Enchilada</label></li>
          <li><input id="M_Carnita" name="ex1" value="5" type="radio"><label for="M_Carnita">Carnita</label></li>
          <li><input id="M_Fajita" name="ex1" value="6" type="radio"><label for="M_Fajita">Fajita</label></li>
          <li><input id="M_Guacamole" name="ex1" value="7" type="radio"><label for="M_Guacamole">Guacamole</label></li>
          <li><input id="M_Chimichanga" name="ex1" value="8" type="radio"><label for="M_Chimichanga">Chimichanga</label></li>
        </ul>
      </div>
      <div id="ItalianMenu" style="display:none;" class="btn-group">
        <button data-toggle="dropdown" class="btn btn-success dropdown-toggle">Menu <span class="caret"></span></button>
        <ul class="dropdown-menu">
          <li><input id="I_Bruschetta" name="ex1" value="1" type="radio"><label for="I_Bruschetta">Bruschetta</label></li>
          <li><input id="I_Pasta" name="ex1" value="2" type="radio"><label for="I_Pasta">Pasta</label></li>
          <li><input id="I_Pizza" name="ex1" value="3" type="radio"><label for="I_Pizza">Pizza</label></li>
          <li><input id="I_Risotto" name="ex1" value="4" type="radio"><label for="I_Risotto">Risotto</label></li>
          <li><input id="I_Tiramisu" name="ex1" value="5" type="radio"><label for="I_Tiramisu">Tiramisu</label></li>
          <li><input id="I_Cheese" name="ex1" value="6" type="radio"><label for="I_Cheese">Cheese</label></li>
          <li><input id="I_Soup" name="ex1" value="7" type="radio"><label for="I_Soup">Soup</label></li>
          <li><input id="I_Meat" name="ex1" value="8" type="radio"><label for="I_Meat">Meat</label></li>
        </ul>
      </div>
      <div id="JapanMenu" style="display:none;" class="btn-group">
        <button data-toggle="dropdown" class="btn btn-success dropdown-toggle">Menu <span class="caret"></span></button>
        <ul class="dropdown-menu">
          <li><input id="J_Sushi" name="ex1" value="1" type="radio"><label for="J_Sushi">Sushi</label></li>
          <li><input id="J_Sashimi" name="ex1" value="2" type="radio"><label for="J_Sashimi">Sashimi</label></li>
          <li><input id="J_Ramen" name="ex1" value="3" type="radio"><label for="J_Ramen">Ramen</label></li>
          <li><input id="J_Tempura" name="ex1" value="4" type="radio"><label for="J_Tempura">Tempura</label></li>
          <li><input id="J_Rice" name="ex1" value="5" type="radio"><label for="J_Rice">Rice</label></li>
          <li><input id="J_Fish" name="ex1" value="6" type="radio"><label for="J_Fish">Fish</label></li>
          <li><input id="J_Soup" name="ex1" value="7" type="radio"><label for="J_Soup">Soup</label></li>
          <li><input id="J_Beef" name="ex1" value="8" type="radio"><label for="J_Beef">Beef</label></li>
        </ul>
      </div>
      <div id="AmericanMenu" style="display:none;" class="btn-group">
        <button data-toggle="dropdown" class="btn btn-success dropdown-toggle">Menu <span class="caret"></span></button>
        <ul class="dropdown-menu">
          <li><input id="A_Sandwich" name="ex1" value="1" type="radio"><label for="A_Sandwich">Sandwich</label></li>
          <li><input id="A_Chicken" name="ex1" value="2" type="radio"><label for="A_Chicken">Chicken</label></li>
          <li><input id="A_Sausage" name="ex1" value="3" type="radio"><label for="A_Sausage">Sausage</label></li>
          <li><input id="A_Turkey" name="ex1" value="4" type="radio"><label for="A_Turkey">Turkey</label></li>
          <li><input id="A_Appetizer" name="ex1" value="5" type="radio"><label for="A_Appetizer">Appetizer</label></li>
          <li><input id="A_Dessert" name="ex1" value="6" type="radio"><label for="A_Dessert">Dessert</label></li>
          <li><input id="A_Soup" name="ex1" value="7" type="radio"><label for="A_Soup">Soup</label></li>
          <li><input id="A_Beef" name="ex1" value="8" type="radio"><label for="A_Beef">Beef</label></li>
        </ul>
      </div>
    </div>

    <div id="weight">
      <input type="range" min="50" max="90" value="70" step="20" onchange="getWeight(this.value)" />
      <img src="img/range.jpg" style="max-width:100%">
      <button id="setweight" class="btn btn-danger btn-sm">Set Weight</button>
    </div>

    <div id="rankbtn">
      <button id="r1" class="btn btn-primary btn-sm">1</button>
      <button id="r2" class="btn btn-primary btn-sm">2</button>
      <button id="r3" class="btn btn-primary btn-sm">3</button>
      <button id="r4" class="btn btn-primary btn-sm">4</button>
      <button id="r5" class="btn btn-primary btn-sm">5</button>
      <button id="r6" class="btn btn-primary btn-sm">6</button>
      <button id="r7" class="btn btn-primary btn-sm">7</button>
      <button id="r8" class="btn btn-primary btn-sm">8</button>
      <button id="r9" class="btn btn-primary btn-sm">9</button>
      <button id="r10" class="btn btn-primary btn-sm">10</button>
    </div>

    <div id="legend">
      <img src="img/legend.jpg">
    </div>

    <a href="guide.html" class="guide-link">Guide</a>

    <div id="detail-panel" style="display:none; background:#f0f8ff; border-radius:6px; padding:12px; margin-top:8px;">
      <h4 id="detail-name" style="margin:0 0 6px; color:#333;"></h4>
      <p style="margin:2px 0; font-size:12px;"><strong>Style:</strong> <span id="detail-cate"></span></p>
      <div style="display:flex; gap:8px; margin:8px 0;">
        <div style="text-align:center"><svg id="gauge-combined" width="50" height="50"></svg><div style="font-size:10px;">Combined</div></div>
        <div style="text-align:center"><svg id="gauge-review" width="50" height="50"></svg><div style="font-size:10px;">Reviews</div></div>
        <div style="text-align:center"><svg id="gauge-price" width="50" height="50"></svg><div style="font-size:10px;">Value</div></div>
      </div>
      <p style="margin:2px 0; font-size:12px;"><strong>Address:</strong> <span id="detail-address"></span></p>
      <div style="margin-top:6px; font-size:11px;">
        <strong>Top Reviews:</strong>
        <p id="detail-r1" style="margin:3px 0; color:#555;"></p>
        <p id="detail-r2" style="margin:3px 0; color:#555;"></p>
        <p id="detail-r3" style="margin:3px 0; color:#555;"></p>
      </div>
    </div>
  </div>

  <div id="map-canvas"></div>
</div>

<script>
  window.addEventListener('load', initialize);
</script>

  </body>
</html>
